name: Seed public Docker Hub repos (one-off)
# TEMPORARY: this workflow seeds Docker Hub repos for db-dumper and
# docker-cron with the latest GHCR image, then will be deleted.
# Triggered manually only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Install crane
        run: |
          # renovate: datasource=github-releases depName=google/go-containerregistry
          VERSION=v0.21.6
          curl -fsSL --retry 3 \
            "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin crane
          crane version

      - name: Authenticate crane to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          printf '%s' "$DOCKERHUB_TOKEN" \
            | crane auth login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Acquire Docker Hub JWT
        id: jwt
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -fsSL --max-time 30 \
            "https://hub.docker.com/v2/users/login/" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg u "$DOCKERHUB_USERNAME" --arg p "$DOCKERHUB_TOKEN" \
              '{username:$u,password:$p}')" \
            | jq -r .token)
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "Docker Hub login failed" >&2
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create or update Docker Hub repos and copy images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JWT: ${{ steps.jwt.outputs.token }}
        run: |
          set -euo pipefail

          declare -A descs=(
            [db-dumper]="HTTP-triggered PostgreSQL dump sidecar for sibling Postgres containers"
            [docker-cron]="Generic Docker cron scheduler with per-job timeouts, locks, and structured logs"
          )

          for app in db-dumper docker-cron; do
            desc="${descs[$app]}"
            echo "::group::$app"

            # 1. Create the Docker Hub repo if it doesn't exist; otherwise
            #    sync the description so it matches the GitHub repo.
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
              "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${app}/" \
              -H "Authorization: Bearer ${JWT}")
            if [[ "$status" == "404" ]]; then
              curl -fsSL --max-time 30 \
                "https://hub.docker.com/v2/repositories/" \
                -H "Authorization: Bearer ${JWT}" \
                -H 'Content-Type: application/json' \
                -d "$(jq -n \
                  --arg ns "$DOCKERHUB_USERNAME" \
                  --arg name "$app" \
                  --arg desc "$desc" \
                  '{namespace:$ns,name:$name,description:$desc,is_private:false}')" \
                >/dev/null
              echo "[dockerhub] created $DOCKERHUB_USERNAME/$app"
            else
              curl -fsSL --max-time 30 -X PATCH \
                "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${app}/" \
                -H "Authorization: Bearer ${JWT}" \
                -H 'Content-Type: application/json' \
                -d "$(jq -n --arg d "$desc" '{description:$d}')" >/dev/null
              echo "[dockerhub] $DOCKERHUB_USERNAME/$app exists; description synced"
            fi

            # 2. Copy GHCR :latest manifest list to Docker Hub :latest.
            crane copy "ghcr.io/cplieger/${app}:latest" \
              "docker.io/${DOCKERHUB_USERNAME}/${app}:latest"

            # 3. Also tag with date-shortdigest so users can pin.
            digest=$(crane digest "ghcr.io/cplieger/${app}:latest")
            short="${digest#sha256:}"
            short="${short:0:12}"
            tag="$(date +%Y.%m.%d)-${short}"
            crane copy "ghcr.io/cplieger/${app}:latest" \
              "docker.io/${DOCKERHUB_USERNAME}/${app}:${tag}"

            echo "[copy] docker.io/${DOCKERHUB_USERNAME}/${app}:latest"
            echo "[copy] docker.io/${DOCKERHUB_USERNAME}/${app}:${tag}"
            echo "::endgroup::"
          done
